<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
    <defs>
        <linearGradient id="z-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d2ff" />
            <stop offset="100%" stop-color="#7928ca" />
        </linearGradient>
        <filter id="z-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="1.8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Stylized geometric Z representing Ziron Core Grid -->
    <path 
        d="M 7 6 L 25 6 L 7 26 L 25 26" 
        stroke="url(#z-grad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#z-glow)"
    />
    
    <!-- Neural beacon intersection dot -->
    <circle cx="16" cy="16" r="2.2" fill="#ffffff" />
</svg>